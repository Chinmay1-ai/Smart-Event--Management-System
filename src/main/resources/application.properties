# Application name
spring.application.name=smart-event-management

# Database config
spring.datasource.url=jdbc:mysql://localhost:3306/sems_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.generate-ddl=true

# JWT config
jwt.secret=mySuper$ecretKey1234567890ABCDEFabcdefghij
jwt.expiration=86400000

# Swagger config
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html